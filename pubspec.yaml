name: cvant_mobile
description: Mobile app Flutter untuk CV ANT, visual mengikuti mobile view website.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  local_auth: ^2.3.0
  shared_preferences: ^2.3.2
  supabase_flutter: ^2.10.3
  flutter_secure_storage: ^9.2.4
  url_launcher: ^6.3.1
  pdf: ^3.11.3
  printing: ^5.13.4
  image: ^4.5.4
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0

dependency_overrides:
  app_links:
    path: third_party/app_links
  flutter_local_notifications_windows:
    path: third_party/flutter_local_notifications_windows
  flutter_secure_storage_windows:
    path: third_party/flutter_secure_storage_windows

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  path: ^1.9.1
  yaml: ^3.1.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/iconapk.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/logo.webp
    - assets/images/logo-light.webp
    - assets/images/logo-icon.webp
    - assets/images/iconapk.png
    - assets/images/kopsurat.jpeg
    - assets/kopsurat.jpeg
    - assets/fonts/
    - assets/templates/invoice_table_template.xlsx
    - tooling/windows/render_invoice_table.ps1
    - assets/images/pp-admin.webp
    - assets/images/pp-owner.webp
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter[opsz,wght].ttf
        - asset: assets/fonts/Inter-Italic[opsz,wght].ttf
          style: italic



