name: cvant_mobile
description: Mobile app Flutter untuk CV ANT, visual mengikuti mobile view website.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  local_auth: ^2.3.0
  shared_preferences: ^2.3.2
  supabase_flutter: ^2.10.3
  flutter_secure_storage: ^9.2.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/iconapk.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.webp
    - assets/images/logo-light.webp
    - assets/images/logo-icon.webp
    - assets/images/big-icon.webp
    - assets/images/icon.webp
    - assets/images/iconapk.png
    - assets/images/pp-admin.webp
    - assets/images/pp-owner.webp
