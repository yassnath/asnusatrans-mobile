name: flutter_local_notifications_windows
description: Windows override for flutter_local_notifications without native ATL dependency.
version: 3.0.0
publish_to: "none"

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.1"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.2
  flutter_local_notifications_platform_interface: ^11.0.0
  meta: ^1.11.0
  timezone: ^0.11.0
  xml: ^6.5.0

flutter:
  plugin:
    implements: flutter_local_notifications
    platforms:
      windows:
        dartPluginClass: FlutterLocalNotificationsWindows
