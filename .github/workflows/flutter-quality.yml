name: Flutter Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: flutter-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Dashboard logic format check
        run: dart format --output=none --set-exit-if-changed lib/features/dashboard/utils test/features/dashboard

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test --reporter github
