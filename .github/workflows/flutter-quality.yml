name: Flutter Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: flutter-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Pubspec lock sync check
        run: git diff --exit-code -- pubspec.lock

      - name: Repository hygiene check
        shell: bash
        run: |
          tracked_ignored="$(git ls-files -ci --exclude-standard)"
          if [ -n "$tracked_ignored" ]; then
            echo "Ignored files are still tracked. Remove them from Git index:"
            echo "$tracked_ignored"
            exit 1
          fi

      - name: Dart format check
        run: dart format --output=none --set-exit-if-changed lib test integration_test

      - name: Dart file size guard
        shell: bash
        run: |
          too_large=""
          while IFS= read -r -d '' file; do
            lines="$(wc -l < "$file")"
            if [ "$lines" -gt 3500 ]; then
              too_large="${too_large}${file}: ${lines} lines"$'\n'
            fi
          done < <(find lib test integration_test -type f -name '*.dart' -print0)
          if [ -n "$too_large" ]; then
            echo "Dart files above 3500 lines should be split before merging:"
            echo "$too_large"
            exit 1
          fi

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test --reporter github
