name: Flutter Integration Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-integration-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Windows integration smoke test
        run: flutter test integration_test -d windows --reporter github
